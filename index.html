<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Exam Cheater</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #0f1117;
    --border: #1a2a1a;
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-glow: rgba(0,255,65,0.15);
    --red: #ff2244;
    --yellow: #ffe000;
    --text: #c8ffc8;
    --muted: #4a7a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 998;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
  }

  .skull {
    font-size: 2rem;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.95); }
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 10px var(--green), 0 0 40px rgba(0,255,65,0.4);
    letter-spacing: 4px;
    margin: 8px 0 4px;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 95%, 97%, 99%, 100% { opacity: 1; }
    96%, 98% { opacity: 0.7; }
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .danger-tag {
    display: inline-block;
    background: var(--red);
    color: #000;
    font-size: 0.6rem;
    font-weight: bold;
    padding: 2px 8px;
    letter-spacing: 2px;
    margin-top: 8px;
    animation: blink 1.5s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* Search bar */
  .search-wrap {
    max-width: 900px;
    margin: 0 auto 24px;
    padding: 0 16px;
    position: relative;
  }
  .search-wrap::before {
    content: '>';
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--green);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 16px 10px 30px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--green);
    box-shadow: 0 0 12px var(--green-glow);
  }
  #searchInput::placeholder { color: var(--muted); }

  /* Stats bar */
  .stats {
    max-width: 900px;
    margin: 0 auto 20px;
    padding: 0 16px;
    display: flex;
    gap: 20px;
    font-size: 0.7rem;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .stats span { color: var(--green); }

  /* Cards grid */
  .grid {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
    display: grid;
    gap: 12px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 16px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green-dim);
    transition: background 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    border-color: var(--green-dim);
    box-shadow: 0 0 20px var(--green-glow), inset 0 0 20px rgba(0,255,65,0.03);
    transform: translateX(3px);
  }

  .card:hover::before {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }

  .card.copied {
    border-color: var(--green);
    box-shadow: 0 0 30px rgba(0,255,65,0.3);
  }
  .card.copied::before {
    background: var(--green);
    box-shadow: 0 0 12px var(--green);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 0.72rem;
    color: #00cc88;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.4;
    flex: 1;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 3px 10px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 1px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .copy-btn:hover, .card:hover .copy-btn {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
  }

  .copy-btn.done {
    border-color: var(--green);
    color: #000;
    background: var(--green);
  }

  .code-block {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: #88dd88;
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .code-block .kw { color: #00ffcc; }
  .code-block .fn { color: #ffcc00; }
  .code-block .str { color: #ff8844; }
  .code-block .num { color: #cc88ff; }
  .code-block .op { color: var(--green); }

  /* Section headers */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 20px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Copy all button */
  .copy-all-wrap {
    max-width: 900px;
    margin: 0 auto 16px;
    padding: 0 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-all {
    background: transparent;
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-all:hover {
    background: var(--yellow);
    color: #000;
    box-shadow: 0 0 20px rgba(255,224,0,0.3);
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #000;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 20px;
    letter-spacing: 2px;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 0.85rem;
    display: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--green-dim); }
</style>
</head>
<body>

<header>
  <div class="skull">☠</div>
  <h1>SMART EXAM CHEATER</h1>
  <div class="subtitle">SQL Query Arsenal — EMP &amp; DEPT Database</div>
  <div class="danger-tag">⚡ CLICK TO COPY ⚡</div>
</header>

<hr class="divider">

<div class="copy-all-wrap">
  <button class="btn-all" onclick="copyAll()">[ COPY ALL QUERIES ]</button>
</div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Search queries..." oninput="filterCards()">
</div>

<div class="stats" id="stats"></div>

<div class="grid" id="grid"></div>
<div class="no-results" id="noResults">// NO MATCHING QUERIES FOUND</div>

<div id="toast">✓ COPIED TO CLIPBOARD</div>

<script>
const queries = [
  // === SETUP ===
  {
    section: "TABLE SETUP",
    title: "CREATE TABLE EMP",
    code: `CREATE TABLE EMP (
  EMPNO INT PRIMARY KEY,
  ENAME VARCHAR(20),
  JOB VARCHAR(20),
  HIREDATE DATE,
  MGR INT,
  SAL DECIMAL(10,2),
  COMM DECIMAL(10,2),
  DEPTNO INT
);`
  },
  {
    section: "TABLE SETUP",
    title: "CREATE TABLE DEPT",
    code: `CREATE TABLE DEPT (
  DEPTNO INT PRIMARY KEY,
  DNAME VARCHAR(20),
  LOC VARCHAR(20)
);`
  },
  {
    section: "TABLE SETUP",
    title: "ALTER TABLE — ADD FOREIGN KEY",
    code: `ALTER TABLE EMP
ADD CONSTRAINT FK_DEPT
FOREIGN KEY (DEPTNO)
REFERENCES DEPT(DEPTNO);`
  },
  {
    section: "TABLE SETUP",
    title: "INSERT INTO DEPT",
    code: `INSERT INTO DEPT VALUES
(10, 'ACCOUNTING', 'NEW YORK'),
(20, 'RESEARCH', 'DALLAS'),
(30, 'SALES', 'CHICAGO'),
(40, 'OPERATIONS', 'BOSTON');`
  },
  {
    section: "TABLE SETUP",
    title: "INSERT INTO EMP",
    code: `INSERT INTO EMP VALUES
(7369, 'SMITH', 'CLERK', '1980-12-17', 7902, 800, NULL, 20),
(7499, 'ALLEN', 'SALESMAN', '1981-02-20', 7698, 1600, 300, 30),
(7521, 'WARD', 'SALESMAN', '1981-02-22', 7698, 1250, 500, 30),
(7566, 'JONES', 'MANAGER', '1981-04-02', 7839, 2975, NULL, 20),
(7654, 'MARTIN', 'SALESMAN', '1981-09-28', 7698, 1250, 1400, 30),
(7698, 'BLAKE', 'MANAGER', '1981-05-01', 7839, 2850, NULL, 30),
(7782, 'CLARK', 'MANAGER', '1981-06-09', 7839, 2450, NULL, 10),
(7788, 'SCOTT', 'ANALYST', '1987-04-19', 7566, 3000, NULL, 20),
(7839, 'KING', 'PRESIDENT', '1981-11-17', NULL, 5000, NULL, 10),
(7844, 'TURNER', 'SALESMAN', '1981-09-08', 7698, 1500, 0, 30),
(7876, 'ADAMS', 'CLERK', '1987-05-23', 7788, 1100, NULL, 20),
(7900, 'JAMES', 'CLERK', '1981-12-03', 7698, 950, NULL, 30),
(7902, 'FORD', 'ANALYST', '1981-12-03', 7566, 3000, NULL, 20),
(7934, 'MILLER', 'CLERK', '1982-01-23', 7782, 1300, NULL, 10);`
  },
  // === BASIC SELECT ===
  {
    section: "BASIC SELECT",
    title: "Q1 — Display ALL details from EMP",
    code: `SELECT * FROM EMP;`
  },
  {
    section: "BASIC SELECT",
    title: "Q2 — Names of ALL employees",
    code: `SELECT ENAME FROM EMP;`
  },
  {
    section: "BASIC SELECT",
    title: "Q3 — Name AND Salary of all employees",
    code: `SELECT ENAME, SAL FROM EMP;`
  },
  // === WHERE CLAUSE ===
  {
    section: "WHERE CLAUSE",
    title: "Q1 — Annual salary of employee SMITH",
    code: `SELECT ENAME, SAL*12 ANNUAL_SAL
FROM EMP
WHERE ENAME='SMITH';`
  },
  {
    section: "WHERE CLAUSE",
    title: "Q2 — Salary of employees working as SALESMAN",
    code: `SELECT JOB, SAL
FROM EMP
WHERE JOB='SALESMAN';`
  },
  // === NULL QUERIES ===
  {
    section: "NULL QUERIES",
    title: "Q1 — Employees whose COMMISSION is NULL",
    code: `SELECT ENAME
FROM EMP
WHERE COMM IS NULL;`
  },
  {
    section: "NULL QUERIES",
    title: "Q2 — Employees who DON'T have a Reporting Manager",
    code: `SELECT ENAME
FROM EMP
WHERE MGR IS NULL;`
  },
  // === AGGREGATE FUNCTIONS ===
  {
    section: "AGGREGATE FUNCTIONS",
    title: "Q1 — Count employees with salary < 2000 in DEPTNO 10",
    code: `SELECT COUNT(*)
FROM EMP
WHERE DEPTNO = 10 AND SAL < 2000;`
  },
  {
    section: "AGGREGATE FUNCTIONS",
    title: "Q2 — Total salary to pay CLERK employees",
    code: `SELECT SUM(SAL)
FROM EMP
WHERE JOB = 'CLERK';`
  },
  // === GROUP BY ===
  {
    section: "GROUP BY",
    title: "Q1 — Employee count per dept (excluding PRESIDENT)",
    code: `SELECT DEPTNO, COUNT(*)
FROM EMP
WHERE JOB NOT IN 'PRESIDENT'
GROUP BY DEPTNO;`
  },
  {
    section: "GROUP BY",
    title: "Q2 — Total salary needed per JOB",
    code: `SELECT JOB, SUM(SAL)
FROM EMP
GROUP BY JOB;`
  },
  // === GROUP BY + HAVING ===
  {
    section: "GROUP BY + HAVING",
    title: "Q1 — Dept count if there are ATLEAST 2 CLERKS per dept",
    code: `SELECT DEPTNO, COUNT(*)
FROM EMP
WHERE JOB='CLERK'
GROUP BY DEPTNO
HAVING COUNT(*)>2;`
  },
  {
    section: "GROUP BY + HAVING",
    title: "Q2 — Dept & total salary if ATLEAST 4 employees per dept",
    code: `SELECT DEPTNO, SUM(SAL), COUNT(*)
FROM EMP
GROUP BY DEPTNO
HAVING COUNT(*)>4;`
  },
  // === SUBQUERIES ===
  {
    section: "SUBQUERIES",
    title: "Q1 — Employees earning MORE than ADAMS",
    code: `SELECT ENAME
FROM EMP
WHERE SAL > (SELECT SAL
             FROM EMP
             WHERE ENAME = 'ADAMS');`
  },
  {
    section: "SUBQUERIES",
    title: "Q2 — Name & salary of employees earning LESS than KING",
    code: `SELECT ENAME, SAL
FROM EMP
WHERE SAL < (SELECT SAL
             FROM EMP
             WHERE ENAME = 'KING');`
  },
  {
    section: "SUBQUERIES",
    title: "Q22 — DNAME & LOC of employee whose ENAME is KING",
    code: `SELECT DNAME, LOC
FROM DEPT
WHERE DEPTNO = (SELECT DEPTNO
                FROM EMP
                WHERE ENAME = 'KING');`
  },
  {
    section: "SUBQUERIES",
    title: "Q23 — LOC of employee whose EMPNO is 7902",
    code: `SELECT LOC
FROM DEPT
WHERE DEPTNO = (SELECT DEPTNO
                FROM EMP
                WHERE EMPNO = 7902);`
  },
];

// Build sections
function buildGrid(filter = '') {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const statsEl = document.getElementById('stats');
  grid.innerHTML = '';

  const sections = {};
  let visibleCount = 0;

  for (const q of queries) {
    if (filter && !q.title.toLowerCase().includes(filter) && !q.code.toLowerCase().includes(filter) && !q.section.toLowerCase().includes(filter)) continue;
    if (!sections[q.section]) sections[q.section] = [];
    sections[q.section].push(q);
    visibleCount++;
  }

  if (visibleCount === 0) {
    noResults.style.display = 'block';
    statsEl.innerHTML = '';
    return;
  }
  noResults.style.display = 'none';

  for (const [sectionName, cards] of Object.entries(sections)) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = `// ${sectionName} (${cards.length})`;
    grid.appendChild(label);

    for (const q of cards) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${q.title}</div>
          <button class="copy-btn" onclick="copyQuery(event, this, ${JSON.stringify(q.code).replace(/"/g, '&quot;')})">[ COPY ]</button>
        </div>
        <div class="code-block">${highlight(q.code)}</div>
      `;
      card.addEventListener('click', function(e) {
        if (e.target.classList.contains('copy-btn')) return;
        const btn = card.querySelector('.copy-btn');
        copyQuery(e, btn, q.code);
      });
      grid.appendChild(card);
    }
  }

  statsEl.innerHTML = `QUERIES: <span>${visibleCount}</span> &nbsp;|&nbsp; SECTIONS: <span>${Object.keys(sections).length}</span> &nbsp;|&nbsp; STATUS: <span>READY TO CHEAT</span>`;
}

function highlight(code) {
  const keywords = ['SELECT', 'FROM', 'WHERE', 'INSERT', 'INTO', 'VALUES', 'CREATE', 'TABLE', 'ALTER', 'ADD', 'CONSTRAINT', 'FOREIGN', 'KEY', 'REFERENCES', 'GROUP', 'BY', 'HAVING', 'ORDER', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL', 'AS', 'INT', 'VARCHAR', 'DATE', 'DECIMAL', 'PRIMARY'];
  const functions = ['COUNT', 'SUM', 'AVG', 'MAX', 'MIN'];
  let h = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/'([^']*)'/g, '<span class="str">\'$1\'</span>');
  h = h.replace(/\b(\d+)\b/g, '<span class="num">$1</span>');
  functions.forEach(f => {
    h = h.replace(new RegExp(`\\b${f}\\b`, 'g'), `<span class="fn">${f}</span>`);
  });
  keywords.forEach(k => {
    h = h.replace(new RegExp(`\\b${k}\\b`, 'g'), `<span class="kw">${k}</span>`);
  });
  return h;
}

function copyText(text) {
  // Try modern clipboard API first
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return Promise.resolve(fallbackCopy(text));
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function copyQuery(e, btn, code) {
  e.stopPropagation();
  copyText(code).then(() => {
    btn.textContent = '[ COPIED! ]';
    btn.classList.add('done');
    const card = btn.closest('.card');
    card.classList.add('copied');
    showToast('✓ COPIED TO CLIPBOARD');
    setTimeout(() => {
      btn.textContent = '[ COPY ]';
      btn.classList.remove('done');
      card.classList.remove('copied');
    }, 1800);
  });
}

function copyAll() {
  const all = queries.map(q => `-- ${q.title}\n${q.code}`).join('\n\n');
  copyText(all).then(() => showToast('✓ ALL QUERIES COPIED!'));
}

function filterCards() {
  const val = document.getElementById('searchInput').value.toLowerCase().trim();
  buildGrid(val);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

buildGrid();
</script>
</body>
</html>
